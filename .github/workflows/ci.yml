name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,mcp-stdio]'

      - name: Lint with ruff
        run: python -m ruff check src tests

      - name: Test with coverage
        run: |
          python -m pytest --cov=maestro_nerve --cov-report=term-missing --cov-report=xml --cov-fail-under=75

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  manifest-check:
    name: validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON parses + versions agree
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import json
          import tomllib
          from pathlib import Path

          root = Path(".")

          def load_json(p: str) -> dict:
              return json.loads((root / p).read_text(encoding="utf-8"))

          claude = load_json(".claude-plugin/plugin.json")
          marketplace = load_json(".claude-plugin/marketplace.json")
          codex = load_json(".codex-plugin/plugin.json")
          pyproject = tomllib.loads((root / "pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]

          assert claude["name"] == "maestro-nerve", claude
          assert claude["version"] == version, (claude["version"], version)
          assert codex["version"] == version, (codex["version"], version)
          assert claude["skills"] == "./skills/"
          assert any(p["name"] == "maestro-nerve" for p in marketplace["plugins"])
          print("manifests ok @", version)
          PY
